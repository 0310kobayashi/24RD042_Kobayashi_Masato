<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空気循環システム</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #000;                 /* 起動時の暫定色（JSが動画の色に差し替え） */
    transition: background-color .4s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px 16px;
  }

  .stage {
    position: relative;
    width: min(92vw, 760px);
    aspect-ratio: 16 / 9;
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity .35s ease;
  }
  .stage video.visible { opacity: 1; }

  .controls { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  button {
    font: 600 16px "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 26px;
    cursor: pointer;
    transition: transform .08s ease, filter .15s ease, opacity .15s ease;
  }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  #startBtn { background: linear-gradient(135deg, #2f81f7, #1f6feb); }
  #stopBtn  { background: linear-gradient(135deg, #f85149, #da3633); }
  button:not(:disabled):hover { filter: brightness(1.1); }
</style>
</head>
<body>
  <div class="stage">
    <video id="runVideo"  class="visible" preload="auto" playsinline>
      <source src="0001-2400.mp4" type="video/mp4">
    </video>
    <video id="stopVideo" preload="auto" playsinline>
      <source src="0001-0240.mp4" type="video/mp4">
    </video>
  </div>

  <div class="controls">
    <button id="startBtn">空気を循環させる</button>
    <button id="stopBtn" disabled>停止する</button>
  </div>

<script>
  "use strict";

  const runVideo  = document.getElementById("runVideo");
  const stopVideo = document.getElementById("stopVideo");
  const startBtn  = document.getElementById("startBtn");
  const stopBtn   = document.getElementById("stopBtn");

  /* ---- CPU負荷ワーカー（コアごとに計算ループ＝ファンが回る） ---- */
  const workerSource = `
    let running = false;
    function chunk() {
      if (!running) return;
      const end = performance.now() + 70;
      let x = 0.0001;
      while (performance.now() < end) {
        for (let i = 0; i < 50000; i++) {
          x += Math.sqrt(i * 1.0001) * Math.sin(x) * Math.cos(i);
        }
      }
      if (x === Infinity) self.postMessage(x);
      setTimeout(chunk, 0);
    }
    self.onmessage = (e) => {
      if (e.data === "start") { if (!running) { running = true; chunk(); } }
      else if (e.data === "stop") { running = false; }
    };
  `;
  const workerUrl = URL.createObjectURL(new Blob([workerSource], { type: "application/javascript" }));
  let workers = [];

  function startLoad() {
    const cores = navigator.hardwareConcurrency || 4;
    for (let i = 0; i < cores; i++) {
      const w = new Worker(workerUrl);
      w.postMessage("start");
      workers.push(w);
    }
  }
  function stopLoad() {
    workers.forEach((w) => w.terminate());
    workers = [];
  }

  /* ---- 動画の背景色をページ背景に反映 ---- */
  function matchBackground() {
    try {
      const c = document.createElement("canvas");
      c.width = 32; c.height = 18;
      const ctx = c.getContext("2d");
      ctx.drawImage(runVideo, 0, 0, c.width, c.height);
      // 四隅を平均して背景色とみなす
      const pts = [[0,0],[c.width-1,0],[0,c.height-1],[c.width-1,c.height-1]];
      let r=0,g=0,b=0;
      for (const [x,y] of pts) {
        const d = ctx.getImageData(x, y, 1, 1).data; // file:// では SecurityError になり得る
        r+=d[0]; g+=d[1]; b+=d[2];
      }
      const n = pts.length;
      document.body.style.backgroundColor = `rgb(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)})`;
    } catch (_) { /* tainted canvas（ローカルfile://のChrome等）→ 黒のまま */ }
  }

  function show(video) {
    runVideo.classList.toggle("visible", video === runVideo);
    stopVideo.classList.toggle("visible", video === stopVideo);
  }

  /* ---- 起動時：先頭フレームで静止＋背景色取得 ---- */
  runVideo.addEventListener("loadeddata", () => {
    try { runVideo.currentTime = 0; } catch (_) {}
    matchBackground();
  });

  /* ---- 循環開始 ---- */
  let circulating = false;
  startBtn.addEventListener("click", async () => {
    if (circulating) return;
    circulating = true;
    startLoad();
    show(runVideo);
    runVideo.loop = true;
    runVideo.currentTime = 0;
    try { await runVideo.play(); } catch (_) {}
    startBtn.disabled = true;
    stopBtn.disabled = false;
  });

  /* ---- 停止：負荷を止め、シームレスに短尺へ差し替え ---- */
  stopBtn.addEventListener("click", async () => {
    if (!circulating) return;
    circulating = false;
    stopLoad();
    stopVideo.loop = false;
    stopVideo.currentTime = 0;
    try { await stopVideo.play(); } catch (_) {}
    show(stopVideo);
    setTimeout(() => runVideo.pause(), 400);
    startBtn.disabled = false;
    stopBtn.disabled = true;
  });

  window.addEventListener("beforeunload", stopLoad);
</script>
</body>
</html>
