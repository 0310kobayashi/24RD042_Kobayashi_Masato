<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空気循環ウェブサイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #3b3b3b;             /* 動画内の背景（灰色） */
    color: #fff;
    font-family: "DotGothic16", "MS Gothic", monospace;   /* ビットマップ調フォント */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 16px;
  }

  h1 {
    margin: 0;
    font-weight: 400;
    font-size: clamp(20px, 4.5vw, 36px);
    letter-spacing: .14em;
    text-align: center;
  }

  .stage {
    position: relative;
    width: min(92vw, 760px);
    aspect-ratio: 16 / 9;
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity .3s ease;
  }

  .controls { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: inherit;
    font-size: 16px;
    letter-spacing: .08em;
    background: transparent;          /* 白枠・白文字 */
    color: #fff;
    border: 2px solid #fff;
    border-radius: 0;                 /* 角ばったビットマップ調 */
    padding: 12px 24px;
    cursor: pointer;
  }
  button:active,
  button.active { background: #fff; color: #3b3b3b; }   /* クリックで色反転 */
  button:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>空気循環ウェブサイト</h1>

  <div class="stage">
    <!-- 循環中（長尺・ループ） 初期表示 -->
    <video id="runVideo"  style="opacity:1; z-index:1" preload="auto" playsinline>
      <source src="0001-2400.mp4" type="video/mp4">
    </video>
    <!-- 停止時（短尺・差し替え） -->
    <video id="stopVideo" style="z-index:2" preload="auto" playsinline>
      <source src="0001-0240.mp4" type="video/mp4">
    </video>
  </div>

  <div class="controls">
    <button id="startBtn">空気を循環させる</button>
    <button id="stopBtn" disabled>停止する</button>
  </div>

<script>
  "use strict";

  const runVideo  = document.getElementById("runVideo");
  const stopVideo = document.getElementById("stopVideo");
  const startBtn  = document.getElementById("startBtn");
  const stopBtn   = document.getElementById("stopBtn");

  /* ---- CPU負荷ワーカー（コアごとに計算ループ＝ファンが回る） ---- */
  const workerSource = `
    let running = false;
    function chunk() {
      if (!running) return;
      const end = performance.now() + 70;
      let x = 0.0001;
      while (performance.now() < end) {
        for (let i = 0; i < 50000; i++) {
          x += Math.sqrt(i * 1.0001) * Math.sin(x) * Math.cos(i);
        }
      }
      if (x === Infinity) self.postMessage(x);
      setTimeout(chunk, 0);
    }
    self.onmessage = (e) => {
      if (e.data === "start") { if (!running) { running = true; chunk(); } }
      else if (e.data === "stop") { running = false; }
    };
  `;
  const workerUrl = URL.createObjectURL(new Blob([workerSource], { type: "application/javascript" }));
  let workers = [];

  // 再生が始まってから、コアを1個ずつ時間差で起動（一気に掴んでカクつかせない）
  function startLoad() {
    const cores = navigator.hardwareConcurrency || 4;
    for (let i = 0; i < cores; i++) {
      setTimeout(() => {
        if (!circulating) return;
        const w = new Worker(workerUrl);
        w.postMessage("start");
        workers.push(w);
      }, i * 20);
    }
  }
  function stopLoad() {
    workers.forEach((w) => w.terminate());
    workers = [];
  }

  /* ---- クロスフェード：下の動画は不透明のまま、上に次の動画をフェードイン ---- */
  let current = runVideo;
  function crossTo(incoming) {
    if (incoming === current) return;
    const outgoing = current;
    incoming.style.zIndex = "2";
    outgoing.style.zIndex = "1";
    outgoing.style.opacity = "1";
    incoming.style.opacity = "0";
    void incoming.offsetWidth;
    incoming.style.opacity = "1";
    current = incoming;
  }

  /* ---- 起動時：両動画を先頭フレームで描画して準備（切替時の黒を防ぐ） ---- */
  runVideo.addEventListener("loadeddata",  () => { try { runVideo.currentTime  = 0; } catch (_) {} });
  stopVideo.addEventListener("loadeddata", () => { try { stopVideo.currentTime = 0; } catch (_) {} });

  /* ---- スピンアップの進み具合＝現在の回転速度(0〜1)を追跡 ----
     長尺=加速動画。末尾 TAIL 区間を「全速」とみなし、そこへ達したら
     末尾だけをループさせる（毎回スロー状態へ戻る違和感を防ぐ）。 */
  const TAIL = 0.18;               // 末尾18%＝全速の持続ループ区間
  let reachedFull = false;         // 一度でも全速に達したか
  function spinSpeed() {           // 現在の回転速度（0=停止, 1=全速）
    if (reachedFull) return 1;
    const d = runVideo.duration;
    if (!d || !isFinite(d)) return 0;
    return Math.max(0, Math.min(1, runVideo.currentTime / (d * (1 - TAIL))));
  }
  runVideo.addEventListener("timeupdate", () => {
    if (!circulating) return;
    const d = runVideo.duration;
    if (!d || !isFinite(d)) return;
    if (runVideo.currentTime >= d - 0.06) {   // 加速し切った → 全速の末尾へループ
      reachedFull = true;
      try { runVideo.currentTime = d * (1 - TAIL); } catch (_) {}
    }
  });

  /* ---- 循環開始 ---- */
  let circulating = false;
  startBtn.addEventListener("click", async () => {
    if (circulating) return;
    circulating = true;

    runVideo.loop = false;        // 末尾ループは timeupdate で管理
    reachedFull = false;
    runVideo.currentTime = 0;     // スピンアップを最初から
    crossTo(runVideo);
    try { await runVideo.play(); } catch (_) {}
    setTimeout(startLoad, 120);

    startBtn.disabled = true;
    stopBtn.disabled = false;
    startBtn.classList.add("active");
    stopBtn.classList.remove("active");
  });

  /* ---- 停止：負荷を止め、シームレスに短尺へ差し替え ---- */
  stopBtn.addEventListener("click", async () => {
    if (!circulating) return;
    circulating = false;

    stopLoad();
    stopVideo.loop = false;
    // 現在の回転速度に合わせてスピンダウンの開始位置を決める。
    // 速い(1)→最初から全減速 / 遅い(0)→終盤からすぐ停止
    const speed = spinSpeed();
    const sd = stopVideo.duration;
    if (sd && isFinite(sd)) {
      stopVideo.currentTime = Math.max(0, Math.min(sd - 0.05, (1 - speed) * sd));
    } else {
      stopVideo.currentTime = 0;
    }
    crossTo(stopVideo);
    try { await stopVideo.play(); } catch (_) {}
    setTimeout(() => runVideo.pause(), 350);

    startBtn.disabled = false;
    stopBtn.disabled = true;
    stopBtn.classList.add("active");
    startBtn.classList.remove("active");
  });

  window.addEventListener("beforeunload", stopLoad);
</script>
</body>
</html>
