<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空気循環ウェブサイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #3b3b3b;             /* 動画内の背景（灰色） */
    color: #fff;
    font-family: "DotGothic16", "MS Gothic", monospace;   /* ビットマップ調フォント */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 16px;
  }

  h1 {
    margin: 0;
    font-weight: 400;
    font-size: clamp(20px, 4.5vw, 36px);
    letter-spacing: .14em;
    text-align: center;
  }

  .stage {
    position: relative;
    width: min(92vw, 760px);
    aspect-ratio: 16 / 9;
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .controls { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: inherit;
    font-size: 16px;
    letter-spacing: .08em;
    background: transparent;          /* 白枠・白文字 */
    color: #fff;
    border: 2px solid #fff;
    border-radius: 0;                 /* 角ばったビットマップ調 */
    padding: 12px 24px;
    cursor: pointer;
  }
  button:active,
  button.active { background: #fff; color: #3b3b3b; }   /* クリックで色反転 */
  button:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>空気循環ウェブサイト</h1>

  <div class="stage">
    <video id="video" preload="auto" playsinline>
      <source src="0001-2400.mp4" type="video/mp4">
    </video>
  </div>

  <div class="controls">
    <button id="startBtn">空気を循環させる</button>
    <button id="stopBtn" disabled>停止する</button>
  </div>

<script>
  "use strict";

  const video    = document.getElementById("video");
  const startBtn = document.getElementById("startBtn");
  const stopBtn  = document.getElementById("stopBtn");

  /* ==== 動画の構成（0001-2400.mp4） ====
     先頭: 回り始め（加速）→ 中盤: 全速 → 末尾 WIND 秒: 回り終わり（減速して停止）
     循環中は「回り終わりの直前の全速部分」だけをループして回し続け、
     停止クリック時に、その瞬間の回転速度に応じて末尾 WIND 秒の中へシークする。 */
  const WIND     = 5;      // 末尾の「回り終わり」区間（秒）
  const LOOP_LEN = 3;      // 全速を持続させるループ区間の長さ（秒）
  const EPS      = 0.25;   // 末尾に入る前にループバックする余裕（秒）

  function windStart() { const d = video.duration; return (d && isFinite(d)) ? d - WIND : 0; }

  /* ---- CPU負荷ワーカー（コアごとに計算ループ＝ファンが回る） ---- */
  const workerSource = `
    let running = false;
    function chunk() {
      if (!running) return;
      const end = performance.now() + 70;
      let x = 0.0001;
      while (performance.now() < end) {
        for (let i = 0; i < 50000; i++) {
          x += Math.sqrt(i * 1.0001) * Math.sin(x) * Math.cos(i);
        }
      }
      if (x === Infinity) self.postMessage(x);
      setTimeout(chunk, 0);
    }
    self.onmessage = (e) => {
      if (e.data === "start") { if (!running) { running = true; chunk(); } }
      else if (e.data === "stop") { running = false; }
    };
  `;
  const workerUrl = URL.createObjectURL(new Blob([workerSource], { type: "application/javascript" }));
  let workers = [];

  function startLoad() {
    const cores = navigator.hardwareConcurrency || 4;
    for (let i = 0; i < cores; i++) {
      setTimeout(() => {
        if (!circulating) return;
        const w = new Worker(workerUrl);
        w.postMessage("start");
        workers.push(w);
      }, i * 20);
    }
  }
  function stopLoad() {
    workers.forEach((w) => w.terminate());
    workers = [];
  }

  /* ---- 回転速度(0〜1)を追跡 ---- */
  let reachedFull = false;
  function spinSpeed() {
    if (reachedFull) return 1;
    const ws = windStart();
    return ws > 0 ? Math.max(0, Math.min(1, video.currentTime / ws)) : 0;
  }

  /* ---- 循環中：末尾に入る手前で全速区間へループバック ---- */
  video.addEventListener("timeupdate", () => {
    if (!circulating) return;
    const ws = windStart();
    if (ws > 0 && video.currentTime >= ws - EPS) {
      reachedFull = true;
      try { video.currentTime = Math.max(0, ws - LOOP_LEN); } catch (_) {}
    }
  });

  /* ---- 起動時：先頭フレームで静止 ---- */
  video.addEventListener("loadeddata", () => { try { video.currentTime = 0; } catch (_) {} });

  /* ---- 循環開始（回り始めから） ---- */
  let circulating = false;
  startBtn.addEventListener("click", async () => {
    if (circulating) return;
    circulating = true;
    reachedFull = false;

    video.loop = false;
    video.currentTime = 0;
    try { await video.play(); } catch (_) {}
    setTimeout(startLoad, 120);

    startBtn.disabled = true;
    stopBtn.disabled = false;
    startBtn.classList.add("active");
    stopBtn.classList.remove("active");
  });

  /* ---- 停止：負荷を止め、末尾の「回り終わり」へ速度に応じてシーク ---- */
  stopBtn.addEventListener("click", async () => {
    if (!circulating) return;
    circulating = false;                 // 先にfalse（timeupdateのループバックを止める）
    stopLoad();

    const ws = windStart();
    const d  = video.duration;
    if (ws > 0 && d && isFinite(d)) {
      const speed = spinSpeed();         // 1=全速 → 末尾先頭 / 0=低速 → 末尾終盤
      const target = ws + (1 - speed) * WIND;
      try { video.currentTime = Math.min(d - 0.05, target); } catch (_) {}
    }
    try { await video.play(); } catch (_) {}   // 末尾を再生し切って停止フレームで静止

    startBtn.disabled = false;
    stopBtn.disabled = true;
    stopBtn.classList.add("active");
    startBtn.classList.remove("active");
  });

  window.addEventListener("beforeunload", stopLoad);
</script>
</body>
</html>
