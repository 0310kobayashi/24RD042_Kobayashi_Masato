<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空気循環システム</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #cfc8c9;              /* 動画内の背景（灰色）に合わせる */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px 16px;
  }

  .stage {
    position: relative;
    width: min(92vw, 760px);
    aspect-ratio: 16 / 9;
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity .3s ease;
  }

  .controls { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  button {
    font: 600 16px "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 26px;
    cursor: pointer;
    transition: transform .08s ease, filter .15s ease, opacity .15s ease;
  }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  #startBtn { background: linear-gradient(135deg, #2f81f7, #1f6feb); }
  #stopBtn  { background: linear-gradient(135deg, #f85149, #da3633); }
  button:not(:disabled):hover { filter: brightness(1.1); }
</style>
</head>
<body>
  <div class="stage">
    <!-- 循環中（長尺・ループ） 初期表示 -->
    <video id="runVideo"  style="opacity:1; z-index:1" preload="auto" playsinline>
      <source src="0001-2400.mp4" type="video/mp4">
    </video>
    <!-- 停止時（短尺・差し替え） -->
    <video id="stopVideo" style="z-index:2" preload="auto" playsinline>
      <source src="0001-0240.mp4" type="video/mp4">
    </video>
  </div>

  <div class="controls">
    <button id="startBtn">空気を循環させる</button>
    <button id="stopBtn" disabled>停止する</button>
  </div>

<script>
  "use strict";

  const runVideo  = document.getElementById("runVideo");
  const stopVideo = document.getElementById("stopVideo");
  const startBtn  = document.getElementById("startBtn");
  const stopBtn   = document.getElementById("stopBtn");

  /* ---- CPU負荷ワーカー（コアごとに計算ループ＝ファンが回る） ---- */
  const workerSource = `
    let running = false;
    function chunk() {
      if (!running) return;
      const end = performance.now() + 70;
      let x = 0.0001;
      while (performance.now() < end) {
        for (let i = 0; i < 50000; i++) {
          x += Math.sqrt(i * 1.0001) * Math.sin(x) * Math.cos(i);
        }
      }
      if (x === Infinity) self.postMessage(x);
      setTimeout(chunk, 0);
    }
    self.onmessage = (e) => {
      if (e.data === "start") { if (!running) { running = true; chunk(); } }
      else if (e.data === "stop") { running = false; }
    };
  `;
  const workerUrl = URL.createObjectURL(new Blob([workerSource], { type: "application/javascript" }));
  let workers = [];

  // 再生が始まってから、コアを1個ずつ時間差で起動（一気に掴んでカクつかせない）
  function startLoad() {
    const cores = navigator.hardwareConcurrency || 4;
    for (let i = 0; i < cores; i++) {
      setTimeout(() => {
        if (!circulating) return;            // 起動前に停止されていたら追加しない
        const w = new Worker(workerUrl);
        w.postMessage("start");
        workers.push(w);
      }, i * 20);
    }
  }
  function stopLoad() {
    workers.forEach((w) => w.terminate());
    workers = [];
  }

  /* ---- クロスフェード：下の動画は不透明のまま、上に次の動画をフェードイン ---- */
  let current = runVideo;                     // 現在表示中
  function crossTo(incoming) {
    if (incoming === current) return;
    const outgoing = current;
    incoming.style.zIndex = "2";
    outgoing.style.zIndex = "1";
    outgoing.style.opacity = "1";             // 下層は完全不透明を維持（背景が透けない＝暗転しない）
    incoming.style.opacity = "0";
    void incoming.offsetWidth;                // リフロー強制でトランジションを効かせる
    incoming.style.opacity = "1";             // 上層をフェードイン
    current = incoming;
  }

  /* ---- 起動時：両動画を先頭フレームで描画して準備（切替時の黒を防ぐ） ---- */
  runVideo.addEventListener("loadeddata",  () => { try { runVideo.currentTime  = 0; } catch (_) {} });
  stopVideo.addEventListener("loadeddata", () => { try { stopVideo.currentTime = 0; } catch (_) {} });

  /* ---- 循環開始 ---- */
  let circulating = false;
  startBtn.addEventListener("click", async () => {
    if (circulating) return;
    circulating = true;

    runVideo.loop = true;
    if (current !== runVideo) runVideo.currentTime = 0;   // 戻すときだけシーク
    crossTo(runVideo);                                    // 先に映像を出してから
    try { await runVideo.play(); } catch (_) {}
    setTimeout(startLoad, 120);                           // 再生が乗ってから負荷を立ち上げ

    startBtn.disabled = true;
    stopBtn.disabled = false;
  });

  /* ---- 停止：負荷を止め、シームレスに短尺へ差し替え ---- */
  stopBtn.addEventListener("click", async () => {
    if (!circulating) return;
    circulating = false;

    stopLoad();
    stopVideo.loop = false;
    stopVideo.currentTime = 0;
    crossTo(stopVideo);
    try { await stopVideo.play(); } catch (_) {}
    setTimeout(() => runVideo.pause(), 350);              // フェード完了後に裏側を停止

    startBtn.disabled = false;
    stopBtn.disabled = true;
  });

  window.addEventListener("beforeunload", stopLoad);
</script>
</body>
</html>
