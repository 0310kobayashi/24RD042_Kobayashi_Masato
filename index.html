<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空気循環ウェブサイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #3b3b3b;             /* 動画内の背景（灰色） */
    color: #fff;
    font-family: "DotGothic16", "MS Gothic", monospace;   /* ビットマップ調フォント */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 16px;
  }

  h1 {
    margin: 0;
    font-weight: 400;
    font-size: clamp(20px, 4.5vw, 36px);
    letter-spacing: .14em;
    text-align: center;
  }

  .stage {
    position: relative;
    width: min(92vw, 760px);
    aspect-ratio: 16 / 9;
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .controls { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: inherit;
    font-size: 16px;
    letter-spacing: .08em;
    background: transparent;          /* 白枠・白文字 */
    color: #fff;
    border: 2px solid #fff;
    border-radius: 0;                 /* 角ばったビットマップ調 */
    padding: 12px 24px;
    cursor: pointer;
  }
  button:active,
  button.active { background: #fff; color: #3b3b3b; }   /* クリックで色反転 */
  button:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>空気循環ウェブサイト</h1>

  <div class="stage">
    <video id="video" preload="auto" playsinline>
      <source src="0001-2400.mp4" type="video/mp4">
    </video>
  </div>

  <div class="controls">
    <button id="startBtn">空気を循環させる</button>
    <button id="stopBtn" disabled>停止する</button>
  </div>

<script>
  "use strict";

  const video    = document.getElementById("video");
  const startBtn = document.getElementById("startBtn");
  const stopBtn  = document.getElementById("stopBtn");

  /* ==== 停止時の再生位置ルール（動画長 D、停止クリック時の再生位置 t 秒） ====
       ・t <= EARLY（回り始め直後）：末尾を EARLY_MIN〜EARLY_MAX 秒だけ再生
           t=0    → 末尾 1秒（すぐ止まる）
           t=EARLY→ 末尾 4秒
       ・それ以外：末尾 LATE_FROM 秒目から再生（しっかり回り終わる）           */
  const EARLY     = 5;    // 「回り始め直後」とみなす秒数
  const EARLY_MIN = 1;    // 早く止めたときの末尾秒数
  const EARLY_MAX = 4;    // EARLY 秒時点での末尾秒数
  const LATE_FROM = 6;    // それ以降で止めたときに再生を始める「末尾からの秒数」

  /* 循環中はここ（末尾の回り終わり）に入らないようループさせる */
  const WIND     = LATE_FROM;   // 末尾の回り終わり区間の目安（秒）
  const LOOP_LEN = 3;           // 全速を持続させるループ区間の長さ（秒）
  const EPS      = 0.25;        // 末尾に入る手前でループバックする余裕（秒）

  /* ---- CPU負荷ワーカー（コア数より多めの計算ループ＝もっとファンが回る） ---- */
  const workerSource = `
    let running = false;
    function chunk() {
      if (!running) return;
      const end = performance.now() + 120;
      let x = 0.0001;
      while (performance.now() < end) {
        for (let i = 0; i < 120000; i++) {
          x += Math.sqrt(i * 1.0001) * Math.sin(x) * Math.cos(i);
        }
      }
      if (x === Infinity) self.postMessage(x);
      setTimeout(chunk, 0);
    }
    self.onmessage = (e) => {
      if (e.data === "start") { if (!running) { running = true; chunk(); } }
      else if (e.data === "stop") { running = false; }
    };
  `;
  const workerUrl = URL.createObjectURL(new Blob([workerSource], { type: "application/javascript" }));
  let workers = [];

  function startLoad() {
    const cores = navigator.hardwareConcurrency || 4;
    const threadCount = Math.max(cores + 1, Math.ceil(cores * 1.5));
    for (let i = 0; i < threadCount; i++) {
      setTimeout(() => {
        if (!circulating) return;
        const w = new Worker(workerUrl);
        w.postMessage("start");
        workers.push(w);
      }, i * 15);
    }
  }
  function stopLoad() {
    workers.forEach((w) => w.terminate());
    workers = [];
  }

  /* ---- 循環中：末尾に入る手前で全速区間へループバック（回し続ける） ---- */
  video.addEventListener("timeupdate", () => {
    if (!circulating) return;
    const d = video.duration;
    if (!d || !isFinite(d)) return;
    const bound = d - WIND;
    if (bound > 0 && video.currentTime >= bound - EPS) {
      try { video.currentTime = Math.max(0, bound - LOOP_LEN); } catch (_) {}
    }
  });

  /* ---- 起動時：先頭フレームで静止 ---- */
  video.addEventListener("loadeddata", () => { try { video.currentTime = 0; } catch (_) {} });

  /* ---- 循環開始（回り始めから） ---- */
  let circulating = false;
  startBtn.addEventListener("click", async () => {
    if (circulating) return;
    circulating = true;

    video.loop = false;
    video.currentTime = 0;
    try { await video.play(); } catch (_) {}
    setTimeout(startLoad, 120);

    startBtn.disabled = true;
    stopBtn.disabled = false;
    startBtn.classList.add("active");
    stopBtn.classList.remove("active");
  });

  /* ---- 停止：負荷を止め、末尾（回り終わり）へクリックのタイミングに応じてシーク ---- */
  stopBtn.addEventListener("click", async () => {
    if (!circulating) return;
    circulating = false;                 // 先にfalse（timeupdateのループバックを止める）
    stopLoad();

    const d = video.duration;
    if (d && isFinite(d)) {
      const t = video.currentTime;       // 停止クリック時の再生位置
      let tailSec;
      if (t <= EARLY) {
        // 回り始め直後：末尾 1〜4秒（早い＝短い）
        tailSec = EARLY_MIN + (t / EARLY) * (EARLY_MAX - EARLY_MIN);
      } else {
        // それ以外：末尾6秒目から
        tailSec = LATE_FROM;
      }
      const target = Math.max(0, Math.min(d - 0.05, d - tailSec));
      try { video.currentTime = target; } catch (_) {}
    }
    try { await video.play(); } catch (_) {}   // 末尾を再生し切って停止フレームで静止

    startBtn.disabled = false;
    stopBtn.disabled = true;
    stopBtn.classList.add("active");
    startBtn.classList.remove("active");
  });

  window.addEventListener("beforeunload", stopLoad);
</script>
</body>
</html>
